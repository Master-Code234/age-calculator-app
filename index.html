<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,700;1,400;1,800&display=swap"
      rel="stylesheet"
    />
    <title>Age Calculator App</title>
  </head>
  <body>
    <main>
      <div class="calculator-container">
        <form class="input-form" id="age-form" autocomplete="off">
          <div class="container">
            <div class="column">
              <label class="column-label" for="day">Day</label>
              <input
                class="column-input"
                type="text"
                id="day"
                placeholder="dd"
                maxlength="2"
              />
              <span class="error-msg" id="day-error"></span>
            </div>

            <div class="column">
              <label class="column-label" for="month">Month</label>
              <input
                class="column-input"
                type="text"
                id="month"
                placeholder="mm"
                maxlength="2"
              />
              <span class="error-msg" id="month-error"></span>
            </div>

            <div class="column">
              <label class="column-label" for="year">Year</label>
              <input
                class="column-input"
                type="text"
                id="year"
                placeholder="yyyy"
                maxlength="4"
              />
              <span class="error-msg" id="year-error"></span>
            </div>
          </div>

          <div class="btn-container">
            <div class="row-1">
              <hr class="divider" />
            </div>
            <div class="row-2">
              <button class="calculate-button" type="submit">
                <img src="./assets/images/icon-arrow.svg" />
              </button>
            </div>
          </div>
        </form>

        <div class="age-info-container">
          <h2 class="age-info-h2">
            <span class="age-info-span" id="years-output">- -</span>years
          </h2>
          <h2 class="age-info-h2">
            <span class="age-info-span" id="months-output">- -</span>months
          </h2>
          <h2 class="age-info-h2">
            <span class="age-info-span" id="days-output">- -</span>days
          </h2>
        </div>
      </div>
    </main>
  </body>
</html>
